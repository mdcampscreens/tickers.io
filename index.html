<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sports Bottom Line</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: transparent;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
        }

        #bottom-line {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 1920px;
            height: 50px;
            background-color: #111111;
            display: flex;
            color: #ffffff;
            border-top: 2px solid #333333;
        }

        #brand-block {
            width: 180px;
            background-color: #008E97;
            color: #ffffff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            font-weight: 900;
            letter-spacing: 1px;
            z-index: 10;
            box-shadow: 5px 0 15px rgba(0,0,0,0.5);
        }

        #ticker-wrap {
            flex: 1;
            overflow: hidden;
            position: relative;
            display: flex;
            align-items: center;
        }

        #ticker-data {
            display: inline-block;
            white-space: nowrap;
            padding-left: 100%;
            animation: tickerScroll linear infinite;
            font-size: 24px;
        }

        @keyframes tickerScroll {
            0% { transform: translate3d(0, 0, 0); }
            100% { transform: translate3d(-100%, 0, 0); }
        }

        /* Styling for News Headlines */
        .news-item {
            display: inline-block;
            margin-right: 30px;
            font-weight: 500;
            color: #eeeeee;
        }
        
        /* Styling for Scoreboards */
        .score-item {
            display: inline-block;
            margin-right: 30px;
        }
        .team {
            font-weight: bold;
            color: #eeeeee;
        }
        .score {
            margin-left: 8px;
            margin-right: 8px;
            color: #ffffff;
        }
        .status {
            color: #aaaaaa;
            font-size: 20px;
            margin-left: 8px;
        }

        /* The Teal Divider */
        .separator {
            display: inline-block;
            margin-right: 30px;
            color: #008E97;
            font-weight: 900;
        }
    </style>
</head>
<body>

    <div id="bottom-line">
        <div id="brand-block">NEWS</div>
        <div id="ticker-wrap">
            <div id="ticker-data">Loading live updates...</div>
        </div>
    </div>

    <script>
        const API_URLS = [
            'https://site.api.espn.com/apis/site/v2/sports/football/nfl/news',
            'https://site.api.espn.com/apis/site/v2/sports/basketball/nba/scoreboard',
            'https://site.api.espn.com/apis/site/v2/sports/baseball/mlb/scoreboard'
        ];

        async function fetchAllData() {
            let tickerContent = '';
            let itemCount = 0;
            const uniqueHeadlines = new Set(); 

            for (const url of API_URLS) {
                try {
                    const response = await fetch(url);
                    if (!response.ok) continue; 
                    
                    const data = await response.json();
                    
                    // IF THE URL IS A NEWS FEED
                    if (data.articles && data.articles.length > 0) {
                        data.articles.forEach(article => {
                            const headline = article.headline;
                            if (!uniqueHeadlines.has(headline)) {
                                uniqueHeadlines.add(headline);
                                tickerContent += `
                                    <span class="news-item">${headline}</span> 
                                    <span class="separator">///</span>
                                `;
                                itemCount++;
                            }
                        });
                    } 
                    // IF THE URL IS A SCOREBOARD FEED
                    else if (data.events && data.events.length > 0) {
                        data.events.forEach(event => {
                            const comp = event.competitions[0];
                            const away = comp.competitors.find(c => c.homeAway === 'away');
                            const home = comp.competitors.find(c => c.homeAway === 'home');
                            
                            const awayTeam = away.team.abbreviation;
                            const awayScore = away.score || '';
                            const homeTeam = home.team.abbreviation;
                            const homeScore = home.score || '';
                            const status = event.status.type.shortDetail;

                            tickerContent += `
                                <span class="score-item">
                                    <span class="team">${awayTeam}</span> 
                                    <span class="score">${awayScore}</span> 
                                    <span style="color:#666;">@</span> 
                                    <span class="team">${homeTeam}</span> 
                                    <span class="score">${homeScore}</span> 
                                    <span class="status">(${status})</span>
                                </span>
                                <span class="separator">///</span>
                            `;
                            itemCount++;
                        });
                    }
                } catch (error) {
                    console.warn("Skipping URL due to error: " + url, error);
                }
            }

            const tickerElement = document.getElementById('ticker-data');
            
            if (tickerContent === '') {
                tickerElement.innerHTML = '<span class="news-item">No updates available at this time.</span>';
            } else {
                tickerElement.innerHTML = tickerContent;
            }

            // Dynamically adjust speed based on total items (news + scores)
            const safeCount = itemCount > 0 ? itemCount : 1;
            const scrollDuration = Math.max(40, safeCount * 6); 
            tickerElement.style.animationDuration = `${scrollDuration}s`;
        }

        // Initial fetch
        fetchAllData();

        // Refresh every 2 minutes to keep scores and news fresh
        setInterval(fetchAllData, 120000);
    </script>
</body>
</html>
