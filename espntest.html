<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NFL News Bottom Line</title>
    <style>
        /* Ensures the background is transparent so it can overlay smoothly */
        body, html {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: transparent;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
        }

        /* 1920x80 exact container matching the layout JSON bounds */
        #bottom-line {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 1920px;
            height: 80px;
            background-color: #111111;
            display: flex;
            color: #ffffff;
            border-top: 2px solid #333333;
        }

        /* The custom teal brand block */
        #brand-block {
            width: 180px;
            background-color: #008E97;
            color: #ffffff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            font-weight: 900;
            letter-spacing: 1px;
            z-index: 10; /* Keeps it above the scrolling text */
            box-shadow: 5px 0 15px rgba(0,0,0,0.5);
        }

        #ticker-wrap {
            flex: 1;
            overflow: hidden;
            position: relative;
            display: flex;
            align-items: center;
        }

        /* Continuous CSS scroll animation */
        #ticker-data {
            display: inline-block;
            white-space: nowrap;
            padding-left: 100%;
            animation: tickerScroll 40s linear infinite;
            font-size: 24px;
        }

        @keyframes tickerScroll {
            0% { transform: translate3d(0, 0, 0); }
            100% { transform: translate3d(-100%, 0, 0); }
        }

        /* Styling individual news items */
        .news-item {
            display: inline-block;
            margin-right: 30px;
            font-weight: 500;
            color: #eeeeee;
        }
        
        .separator {
            display: inline-block;
            margin-right: 30px;
            color: #008E97;
            font-weight: 900;
        }
    </style>
</head>
<body>

    <div id="bottom-line">
        <div id="brand-block">NEWS</div>
        <div id="ticker-wrap">
            <div id="ticker-data">Loading live news...</div>
        </div>
    </div>

    <script>
        const API_URL = 'https://site.api.espn.com/apis/site/v2/sports/football/nfl/news';

        async function fetchNFLNews() {
            try {
                const response = await fetch(API_URL);
                const data = await response.json();
                
                let tickerContent = '';

                if (data.articles && data.articles.length > 0) {
                    data.articles.forEach(article => {
                        const headline = article.headline;
                        tickerContent += `
                            <span class="news-item">${headline}</span> 
                            <span class="separator">///</span>
                        `;
                    });
                } else {
                    tickerContent = '<span class="news-item">No news available at this time.</span>';
                }

                document.getElementById('ticker-data').innerHTML = tickerContent;
            } catch (error) {
                console.error("Error fetching news:", error);
                document.getElementById('ticker-data').innerHTML = "Unable to load live feed.";
            }
        }

        // Initial fetch
        fetchNFLNews();

        // Refresh news every 5 minutes (300000 ms) since news doesn't update as fast as scores
        setInterval(fetchNFLNews, 300000);
    </script>
</body>
</html>
